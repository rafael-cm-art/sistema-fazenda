<!DOCTYPE html>
<html>
<head>
    <title>Cadastro</title>
</head>
<body>

<h2>Cadastrar Animal</h2>

<!-- FORM DE CADASTRO -->
<form action="/salvar" method="post">
    Nome: <input name="nome"><br>

    Tipo:
    <select name="tipo">
        <option value="leite">Leite</option>
        <option value="corte">Corte</option>
    </select><br>

    <button>Salvar</button>
</form>

<hr>

<h3>Animais cadastrados:</h3>

<ul>
{% for animal in animais %}
    <li>
        <b>{{ animal[1] }}</b> ({{ animal[2] }})

        <!-- FORM DE ANOTAÇÃO (AGORA NO LUGAR CERTO) -->
        <form action="/anotar/{{ animal[0] }}" method="post">
            <input name="texto" placeholder="Ex: morreu, doente...">
            <button>Salvar</button>
        </form>

        <!-- LISTA DE ANOTAÇÕES -->
        <ul>
        {% for anot in anotacoes %}
            {% if anot[1] == animal[0] %}
                <li>{{ anot[3] }} - {{ anot[2] }}</li>
            {% endif %}
        {% endfor %}
        </ul>

    </li>
{% endfor %}
</ul>

<a href="/dashboard">Voltar</a>

</body>
</html>
